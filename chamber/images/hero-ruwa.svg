<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" role="img" aria-labelledby="title desc">
  <title id="title">Ruwa business district hero image</title>
  <desc id="desc">Illustrated skyline with road, buildings, and sunrise to represent business growth.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#73c6f2" />
      <stop offset="100%" stop-color="#e7f6ff" />
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe084" />
      <stop offset="100%" stop-color="#ffc24a" />
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f5461" />
      <stop offset="100%" stop-color="#187b8d" />
    </linearGradient>
  </defs>

  <rect width="1600" height="700" fill="url(#sky)" />
  <circle cx="1240" cy="140" r="90" fill="url(#sun)" opacity="0.92" />

  <g fill="#2f6f86" opacity="0.85">
    <rect x="140" y="250" width="140" height="220" rx="4" />
    <rect x="280" y="190" width="170" height="280" rx="4" />
    <rect x="470" y="230" width="115" height="240" rx="4" />
    <rect x="590" y="170" width="190" height="300" rx="4" />
    <rect x="790" y="215" width="120" height="255" rx="4" />
    <rect x="930" y="170" width="210" height="300" rx="4" />
  </g>

  <g fill="#d5f0ff">
    <rect x="165" y="280" width="22" height="20" />
    <rect x="205" y="280" width="22" height="20" />
    <rect x="245" y="280" width="22" height="20" />
    <rect x="305" y="225" width="28" height="22" />
    <rect x="350" y="225" width="28" height="22" />
    <rect x="395" y="225" width="28" height="22" />
    <rect x="625" y="205" width="28" height="22" />
    <rect x="670" y="205" width="28" height="22" />
    <rect x="715" y="205" width="28" height="22" />
    <rect x="960" y="205" width="28" height="22" />
    <rect x="1005" y="205" width="28" height="22" />
    <rect x="1050" y="205" width="28" height="22" />
  </g>

  <path d="M0 470 L1600 470 L1600 700 L0 700 Z" fill="url(#ground)" />
  <path d="M0 560 Q780 440 1600 560 L1600 700 L0 700 Z" fill="#10495a" opacity="0.6" />

  <g fill="#f0f7ff" opacity="0.88">
    <path d="M720 560 L880 560 L1010 700 L590 700 Z" />
    <rect x="785" y="560" width="30" height="140" fill="#e7f2fb" />
    <rect x="760" y="600" width="80" height="10" />
    <rect x="760" y="630" width="80" height="10" />
  </g>
</svg>
